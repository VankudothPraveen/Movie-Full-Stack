<div class="page-header">
  <div class="page-title-group">
    <h1 class="page-title">Movie Collection</h1>
    <p class="page-subtitle">Browse, manage and organize your movies</p>
  </div>
  <button (click)="addMovie()" class="btn-primary">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Movie
  </button>
</div>

<!-- Success Toast -->
<div *ngIf="successMessage" class="toast-success">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
  {{ successMessage }}
</div>

<!-- Loading State -->
<div *ngIf="isLoading" class="state-box">
  <div class="spinner"></div>
  <p class="state-text">Loading your collection…</p>
</div>

<!-- Error State -->
<div *ngIf="error" class="alert-error">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  {{ error }}
</div>

<!-- Empty State -->
<div *ngIf="!isLoading && movies.length === 0 && !error" class="state-box">
  <div class="empty-icon">🎬</div>
  <p class="state-title">No movies yet</p>
  <p class="state-text">Start by adding your first movie to the collection.</p>
  <button (click)="addMovie()" class="btn-primary" style="margin-top:20px">Add First Movie</button>
</div>

<!-- Movie Grid -->
<div *ngIf="!isLoading && movies.length > 0" class="movies-grid">
  <div *ngFor="let movie of movies" class="movie-card" [class.is-confirming]="deleteConfirmId === movie.id">
    <div class="card-accent-bar"></div>
    <div class="card-body">
      <div class="card-header">
        <div class="card-icon">🎥</div>
        <span class="genre-badge">{{ movie.genre }}</span>
      </div>
      <h3 class="movie-title">{{ movie.title }}</h3>
      <div class="movie-meta">
        <div class="meta-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          {{ movie.releaseYear }}
        </div>
      </div>
    </div>

    <!-- Normal Actions -->
    <div class="card-actions" *ngIf="deleteConfirmId !== movie.id">
      <button (click)="editMovie(movie.id!)" class="btn-edit">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit
      </button>
      <button (click)="confirmDelete(movie.id!)" class="btn-delete">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Delete
      </button>
    </div>

    <!-- Delete Confirmation Inline -->
    <div class="card-confirm" *ngIf="deleteConfirmId === movie.id">
      <span class="confirm-text">Delete "{{ movie.title }}"?</span>
      <div class="confirm-btns">
        <button (click)="deleteMovie(movie.id!)" class="btn-confirm-yes">Yes, Delete</button>
        <button (click)="cancelDelete()" class="btn-confirm-no">Cancel</button>
      </div>
    </div>
  </div>
</div>
